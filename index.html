<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تطبيق إدارة المحل</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 0; padding: 0; background-color: #f4f4f9; }
        .header { text-align: center; padding: 15px; background: #fff; border-bottom: 2px solid #ddd; }
        .header input { margin: 5px; padding: 8px; }
        .marquee-text { direction: rtl; font-weight: bold; color: #333; margin-top: 10px; }
        
        /* تنسيق أزرار التبويبات */
        .tabs { display: flex; justify-content: center; gap: 10px; margin: 15px; }
        .tab-btn { padding: 10px 20px; cursor: pointer; border: none; background: #007bff; color: white; border-radius: 5px; font-weight: bold;}
        
        /* تنسيق حاويات الأقسام */
        .tab-content { display: none; padding: 20px; background: white; margin: 15px; border-radius: 5px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .active { display: block; } /* يظهر القسم النشط فقط */
    </style>
</head>
<body>

    <!-- الترويسة -->
    <div class="header">
        <input type="file" id="logoUpload" accept="image/*" title="اختر شعار المحل">
        <input type="text" placeholder="اكتب اسم المحل هنا..." id="shopName">
        
        <!-- الشريط النصي المتحرك -->
        <marquee class="marquee-text">برمجة وتصميم عصام المهدي 779551518 اذكر الله وصل على النبي</marquee>
    </div>

    <!-- أزرار الأقسام (أ، ب، ج) -->
    <div class="tabs">
        <button class="tab-btn" onclick="openTab('tasks')">أ - المهمات</button>
        <button class="tab-btn" onclick="openTab('shortages')">ب - النواقص</button>
        <button class="tab-btn" onclick="openTab('prices')">ج - الأسعار</button>
    </div>

    <!-- الأقسام الثلاثة -->
    <div id="tasks" class="tab-content active">
        <h3>قسم المهمات (سيتم إضافة الأقسام الأربعة هنا)</h3>
    </div>
    
    <div id="shortages" class="tab-content">
        <h3>قسم النواقص (سيتم إضافة الجداول هنا)</h3>
    </div>
    
    <div id="prices" class="tab-content">
        <h3>قسم الأسعار (سيتم إضافة جدول الخصومات هنا)</h3>
    </div>

    <script>
        // دالة بسيطة للتنقل بين الأقسام
        function openTab(tabId) {
            let contents = document.querySelectorAll('.tab-content');
            contents.forEach(content => content.classList.remove('active'));
            document.getElementById(tabId).classList.add('active');
        }
    </script>

</body>
</html>

<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>
إدارة محلات قيس لمواد البناء
</title>


<link rel="stylesheet" href="css/style.css">


<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">


</head>


<body>


<!-- الترويسة -->

<header class="app-header">


<div class="header-icon">

<i class="fa-solid fa-shop"></i>

</div>


<div class="header-text">

<h1>
إدارة محلات قيس
</h1>

<h2>
لمواد البناء
</h2>

<p>
نظام إدارة المحل الذكي
</p>


</div>


</header>




<!-- الشريط المتحرك -->

<div class="developer-bar">

<marquee direction="left">

برمجة وتصميم عصام المهدي 779551518
&nbsp;&nbsp; | &nbsp;&nbsp;
اذكر الله وصل على النبي

</marquee>

</div>





<!-- القائمة الرئيسية -->


<section class="dashboard">


<h3>
الرئيسية
</h3>



<div class="apps-grid">



<!-- المهمات -->

<div class="app-button"
onclick="openTasks()">

<div class="icon-box">

<i class="fa-solid fa-list-check"></i>

</div>


<span>
المهمات
</span>


</div>




<!-- النواقص -->

<div class="app-button"
onclick="openShortages()">


<div class="icon-box">

<i class="fa-solid fa-box-open"></i>

</div>


<span>
النواقص المطلوبة
</span>


</div>





<!-- الأسعار -->


<div class="app-button"
onclick="openPrices()">


<div class="icon-box">

<i class="fa-solid fa-tags"></i>

</div>


<span>
الأسعار
</span>


</div>



</div>


</section>





<script>


function openTasks(){

alert("قسم المهمات");

}


function openShortages(){

alert("قسم النواقص");

}


function openPrices(){

alert("قسم الأسعار");

}


</script>


</body>

</html>
